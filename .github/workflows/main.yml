name: Build and Release OhmMaster APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

# REQUIRED: grant write permissions so GITHUB_TOKEN can create releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK API 36
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant Gradle Execute Permission
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK to OhmMaster.apk
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/OhmMaster.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OhmMaster-apk
          path: release/OhmMaster.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v1
        with:
          files: release/OhmMaster.apk
          tag_name: v2.0.${{ github.run_number }}
          name: OhmMaster Pro v2.0.${{ github.run_number }}
          body: |
            ✅ Compilación automática OK
            📱 Instala **OhmMaster.apk** directamente en tu Android.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
